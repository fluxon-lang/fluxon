name: CI

# Har bir o'zgarishdan keyin ishga tushadi: master'ga push va har qanday PR.
on:
  push:
    branches: ["**"]
  pull_request:

# Bir branch'da yangi push bo'lsa, eski (tugamagan) run'larni bekor qiladi —
# CI navbatini tejaydi.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Runtime kodi shu papkada (root emas).
  WORKDIR: runtime

jobs:
  # Asosiy job: kompilyatsiya + testlar. BU MAJBURIY — til yadrosi ishlashini
  # tasdiqlaydi. Linux va macOS'da ishga tushadi.
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain o'rnatish (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cargo registry, git va build artefaktlarini cache'laydi — qayta
      # build'larni sezilarli tezlashtiradi.
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      # Cargo.lock commit qilingan (binary loyiha) — --locked bilan aynan
      # o'sha versiyalarni ishlatamiz, CI takrorlanuvchi bo'ladi.
      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

      # Smoke-test: haqiqiy .fx faylni ishga tushiramiz. Bu til faqat
      # kompilyatsiya bo'libgina qolmay, dasturni bajara olishini tasdiqlaydi.
      # server.fx HTTP server ochib bloklanadi, shuning uchun demo.fx ishlatamiz.
      - name: Smoke-test (demo.fx ishga tushirish)
        run: cargo run --locked --quiet -- run examples/demo.fx

  # Sifat tekshiruvi: format + clippy lint. Hozircha NON-BLOCKING
  # (continue-on-error) — kod faol ishlab chiqilmoqda; CI'ni qizil qilmasdan
  # ogohlantirish beradi. Kod barqarorlashgach -D warnings majburiy qilinadi.
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain o'rnatish (fmt + clippy bilan)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Format tekshiruvi (cargo fmt --check)
        continue-on-error: true
        run: cargo fmt --check

      - name: Clippy lint
        continue-on-error: true
        run: cargo clippy --locked --all-targets -- -D warnings
