name: CI

# Runs after every change: pushes to master and any PR.
on:
  push:
    branches: ["**"]
  pull_request:

# When a branch gets a new push, cancel the older (unfinished) runs —
# saves the CI queue.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The runtime code lives in this folder (not the root).
  WORKDIR: runtime

jobs:
  # Main job: compilation + tests. THIS IS REQUIRED — it confirms the language
  # core works. Runs on Linux and macOS.
  build-test:
    name: Build & Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      # Caches the Cargo registry, git, and build artifacts — significantly
      # speeds up subsequent builds.
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      # Cargo.lock is committed (binary project) — with --locked we use exactly
      # those versions, making CI reproducible.
      - name: Build
        run: cargo build --locked --verbose

      - name: Test
        run: cargo test --locked --verbose

      # Smoke test: we run a real .fx file. This confirms the language not only
      # compiles but can actually execute a program.
      # server.fx opens an HTTP server and blocks, so we use demo.fx instead.
      - name: Smoke test (run demo.fx)
        run: cargo run --locked --quiet -- run examples/demo.fx

      # .fx integration suite: e2e tests written IN the language itself. Catches
      # user-level breakages when the core (lexer/parser/interp/builtins) changes
      # — for regressions the Rust tests don't cover.
      # run_all.sh picks up the debug binary via FLUXON_BIN (no separate release
      # build needed); the http test uses `curl` (present by default on runners).
      - name: Fluxon .fx integration tests (tests-fx/run_all.sh)
        env:
          FLUXON_BIN: target/debug/fluxon
        run: bash tests-fx/run_all.sh

  # Quality check: format + clippy lint. Currently NON-BLOCKING
  # (continue-on-error) — the code is under active development; it warns without
  # turning CI red. Once the code stabilizes, -D warnings will be enforced.
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (with fmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Format check (cargo fmt --check)
        continue-on-error: true
        run: cargo fmt --check

      - name: Clippy lint
        continue-on-error: true
        run: cargo clippy --locked --all-targets -- -D warnings
