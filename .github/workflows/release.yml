name: Release

# Creates a GitHub Release when a PR opened from a version/* branch is merged.
# workflow_dispatch is also kept for manual re-runs.
on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example: 0.2.0 or v0.2.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  WORKDIR: runtime
  BIN_NAME: fluxon

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        startsWith(github.head_ref, 'version/') &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
      release_version: ${{ steps.release.outputs.release_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw_version="${{ inputs.version }}"
          else
            raw_version="${GITHUB_HEAD_REF#version/}"
          fi

          release_version="${raw_version#v}"
          crate_version="$(awk -F '"' '/^version =/ { print $2; exit }' "$WORKDIR/Cargo.toml")"

          if [ -z "$release_version" ]; then
            echo "Release version not found." >&2
            exit 1
          fi

          if [ "$release_version" != "$crate_version" ]; then
            echo "Branch/input version ($release_version) does not match runtime/Cargo.toml version ($crate_version)." >&2
            exit 1
          fi

          {
            echo "release_tag=v$release_version"
            echo "release_version=$release_version"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build release asset (${{ matrix.os }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime

      - name: Release build
        run: cargo build --locked --release --verbose

      - name: Package the binary
        shell: bash
        run: |
          mkdir -p dist package

          case "$RUNNER_OS" in
            Linux)
              os_name="linux"
              bin_file="$BIN_NAME"
              ;;
            macOS)
              os_name="macos"
              bin_file="$BIN_NAME"
              ;;
            Windows)
              os_name="windows"
              bin_file="$BIN_NAME.exe"
              ;;
            *)
              echo "Unknown OS: $RUNNER_OS" >&2
              exit 1
              ;;
          esac

          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64)
              arch="x86_64"
              ;;
            arm64|aarch64)
              arch="aarch64"
              ;;
          esac

          asset_base="$BIN_NAME-${{ needs.prepare.outputs.release_tag }}-$os_name-$arch"
          cp "target/release/$bin_file" "package/$bin_file"

          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a "dist/$asset_base.zip" "package/$bin_file"
          else
            tar -czf "dist/$asset_base.tar.gz" -C package "$bin_file"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: runtime/dist/*
          if-no-files-found: error

  publish:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Create release or update assets
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "Fluxon $RELEASE_TAG" \
              --generate-notes
          fi
